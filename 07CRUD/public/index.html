<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejemplo de CRUD</title>
</head>
<body>
    <header><h1>Ejemplo de Gestion de Usuarios</h1></header>
    <main>
        <section>
            <h2 id="form.titulo"> Agregar nuevos usuarios</h2>
            <form id="form-usuario">
                <input type="hidden" id="id-usuario">
                <div class="campo">
                    <label for="nombre">Nombre completo</label>
                    <input type="text" id="nombre" placeholder="Aqui va tunombre" maxlength="60" required>
                    <span id="error-nombre" class="error"></span>
                </div>

                <div class="campo">
                    <label for="nombre">Fecha de nacimiento</label>
                    <input type="date" id="fecha_nacimiento" required>
                    <span id="error-fecha" class="error"></span>
                </div>

                <div class="campo">
                    <label for="nombre">Nota (0-10)</label>
                    <input type="number" id="nota" placeholder="Por ejemplo 8.5" min="0" max="10" required>
                    <span id="error-nota" class="error"></span>
                </div>
                <button type="submit" id="btn-guardar">Guardar</button>
                <button type="button" id="btn-cancelar" class="btn-secundario" style="display: none">Cancelar</button>
            </form>
        </section>
        <section>
            <h2>Lista de Usuarios</h2>
            <p id="mensaje-carga">Cargando Usuarios...</p>
            <p id="mensaje-vacio" style="display: none;">No hay Usuarios</p>
            <table id="tabla-usuarios" style="display: none;">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nombre</th>
                        <th>Fecha de nacimiento</th>
                        <th>Notas</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="tbody-usuarios"></tbody>
            </table>
        </section>
    </main>
</body>
</html>
